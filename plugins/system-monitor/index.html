<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Monitor</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #000;
      color: #fff;
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      overflow: hidden;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .header {
      font-size: 18px;
      font-weight: bold;
      color: #a855f7;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.3);
      padding-bottom: 10px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .stat-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #a855f7;
    }
    .bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: #a855f7;
      transition: width 0.3s ease;
      width: 0%;
    }
    .cpu-cores {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    .core-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(168, 85, 247, 0.2);
      border-radius: 4px;
      padding: 10px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .core-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(168, 85, 247, 0.2);
      z-index: 0;
      transition: height 0.3s ease;
    }
    .core-text {
      position: relative;
      z-index: 1;
      font-size: 12px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      System Resources
    </div>
    
    <div class="stat-row">
      <div>
        <div class="stat-label">CPU Usage</div>
        <div class="bar-container"><div class="bar-fill" id="cpu-bar"></div></div>
      </div>
      <div class="stat-value" id="cpu-val">0%</div>
    </div>

    <div class="stat-row">
      <div>
        <div class="stat-label">Memory Usage (<span id="mem-total">0</span> GB)</div>
        <div class="bar-container"><div class="bar-fill" id="mem-bar"></div></div>
      </div>
      <div class="stat-value" id="mem-val">0%</div>
    </div>

    <div class="cpu-cores" id="cpu-cores-container">
      <!-- CPU cores will be injected here -->
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
