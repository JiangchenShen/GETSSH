<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETSSH SDK Diagnostics</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .header {
      margin-bottom: 24px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #a855f7;
      margin: 0 0 8px 0;
    }
    .subtitle {
      font-size: 14px;
      color: #a1a1aa;
      margin: 0;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
    }
    .test-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .test-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }
    .test-item.running {
      border-color: #eab308;
      background: rgba(234, 179, 8, 0.05);
    }
    .test-item.passed {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.05);
    }
    .test-item.failed {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }
    .status-icon {
      font-size: 20px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .running .status-icon::after { content: "⏳"; }
    .passed .status-icon::after { content: "✅"; }
    .failed .status-icon::after { content: "❌"; }
    .pending .status-icon::after { content: "⚪"; }
    
    .test-content {
      flex: 1;
      min-width: 0;
    }
    .test-name {
      font-weight: 600;
      font-size: 15px;
      margin: 0 0 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      font-family: monospace;
    }
    .test-desc {
      font-size: 13px;
      color: #a1a1aa;
      margin: 0 0 8px 0;
    }
    .test-output {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      background: #000;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e4e4e7;
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .test-item.passed .test-output,
    .test-item.failed .test-output {
      display: block;
    }
    .failed .test-output {
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.3);
    }
    .passed .test-output {
      color: #86efac;
      border-color: rgba(34, 197, 94, 0.3);
    }
    
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: flex-end;
    }
    button {
      background: #a855f7;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #9333ea;
    }
    button:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">SDK Diagnostics</h1>
    <p class="subtitle">Automated testing for GETSSH Plugin Engine & IPC APIs</p>
  </div>

  <div class="card">
    <ul class="test-list" id="test-list">
      <!-- Generated dynamically -->
    </ul>
  </div>

  <div class="controls">
    <button id="run-btn" onclick="runAllTests()">Run Diagnostics</button>
  </div>

  <script src="./script.js"></script>
</body>
</html>
