name: Release GETSSH v2.0

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: x64
            eb_target: --mac --x64
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            arch: arm64
            eb_target: --mac --arm64
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            arch: x64
            eb_target: --win --x64
            rust_target: x86_64-pc-windows-msvc
          - os: windows-latest
            arch: arm64
            eb_target: --win --arm64
            rust_target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            arch: x64
            eb_target: --linux --x64
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            arch: arm64
            eb_target: --linux --arm64
            rust_target: aarch64-unknown-linux-gnu
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install System Dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config gcc g++ make
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Install Node Dependencies
        run: pnpm install

      - name: Build Rust N-API Addons
        run: |
          for module in getssh-kv getssh-sysprobe getssh-unarchive getssh-vault sftp-stream; do
            echo "Building $module for ${{ matrix.rust_target }}..."
            cd rust-core/$module
            pnpm install
            npx --package=@napi-rs/cli napi build --release --target ${{ matrix.rust_target }}
            cd ../..
          done
        shell: bash

      - name: Build Rust Watchdog
        run: |
          cd rust-core/watchdog
          cargo build --release --target ${{ matrix.rust_target }}
          cd ../..
          # The binary is generated at target/${{ matrix.rust_target }}/release/watchdog
          # We must copy it to target/release/watchdog for electron-builder to find it
          mkdir -p target/release
          cp target/${{ matrix.rust_target }}/release/watchdog target/release/watchdog || cp target/${{ matrix.rust_target }}/release/watchdog.exe target/release/watchdog.exe || true
        shell: bash

      - name: Build and Package Electron App
        run: |
          pnpm exec vite build
          pnpm exec electron-builder --publish never ${{ matrix.eb_target }}
        shell: bash

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
          draft: true
          prerelease: false
